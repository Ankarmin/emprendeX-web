packages:
  - "apps/*"

allowBuilds:
  '@nestjs/core': true
  '@scarf/scarf': true
  bcrypt: true
  esbuild: true
  sharp: true
  unrs-resolver: true

overrides:
  ajv@^6.0.0: 6.14.0
  brace-expansion@^1.1.0: 1.1.15
  brace-expansion@^2.0.0: 2.1.1
  esbuild: 0.28.1
  flatted: 3.4.2
  '@babel/core@^7.0.0': 7.29.7
  form-data@^4.0.0: 4.0.6
  js-yaml: 4.2.0
  minimatch@^3.0.0: 3.1.5
  minimatch@^9.0.0: 9.0.9
  multer: 2.2.0
  picomatch@^2.3.0: 2.3.2
  picomatch@^4.0.0: 4.0.4
  postcss: 8.5.15
  vite: 8.0.16

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@scarf/scarf'
  - bcrypt
  - esbuild
  - sharp
  - unrs-resolver
