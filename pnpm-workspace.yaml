packages:
  - "apps/*"

allowBuilds:
  '@nestjs/core': true
  bcrypt: true
  esbuild: true
  sharp: true
  unrs-resolver: true

overrides:
  ajv@^6.0.0: 6.14.0
  brace-expansion@^1.1.0: 1.1.13
  brace-expansion@^2.0.0: 2.0.3
  flatted: 3.4.2
  js-yaml: 4.1.1
  minimatch@^3.0.0: 3.1.4
  minimatch@^9.0.0: 9.0.7
  picomatch@^2.3.0: 2.3.2
  picomatch@^4.0.0: 4.0.4
  postcss: 8.5.10

onlyBuiltDependencies:
  - '@nestjs/core'
  - bcrypt
  - esbuild
  - sharp
  - unrs-resolver
