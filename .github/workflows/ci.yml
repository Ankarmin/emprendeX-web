name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint monorepo
        run: pnpm run lint

      - name: Check types
        run: pnpm run check-types

      - name: Run API unit tests
        run: pnpm run test:api:ci

      - name: Run API e2e tests
        run: pnpm run test:api:e2e

      - name: Run web unit tests
        run: pnpm run test:web:ci

      - name: Build monorepo
        run: pnpm run build
