name: CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package production build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint monorepo
        run: pnpm run lint

      - name: Check types
        run: pnpm run check-types

      - name: Run API unit tests
        run: pnpm run test:api:ci

      - name: Run API e2e tests
        run: pnpm run test:api:e2e

      - name: Build monorepo
        run: pnpm run build

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: emprende-x-${{ github.sha }}
          retention-days: 14
          path: |
            apps/api/dist
            apps/web/.next
            Dockerfile
            docker-compose.yaml
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            turbo.json
            apps/api/package.json
            apps/web/package.json

  deploy-webhook:
    name: Trigger deployment webhook
    needs: package
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') }}
    env:
      RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}

    steps:
      - name: Skip webhook when not configured
        if: ${{ env.RAILWAY_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "RAILWAY_DEPLOY_HOOK_URL is not configured. Artifact was created successfully."

      - name: Call Railway deploy hook
        if: ${{ env.RAILWAY_DEPLOY_HOOK_URL != '' }}
        run: |
          curl --fail-with-body --request POST "$RAILWAY_DEPLOY_HOOK_URL"
