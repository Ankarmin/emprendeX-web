name: CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package production build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint:check

      - name: Run unit tests
        run: npm run test:ci

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Remove development dependencies
        run: npm prune --omit=dev

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: emprende-x-backend-${{ github.sha }}
          retention-days: 14
          path: |
            dist
            node_modules
            package.json
            package-lock.json

  deploy-webhook:
    name: Trigger deployment webhook
    needs: package
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') }}
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
      DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}

    steps:
      - name: Skip webhook when not configured
        if: ${{ env.DEPLOY_WEBHOOK_URL == '' }}
        run: |
          echo "DEPLOY_WEBHOOK_URL is not configured. Artifact was created successfully."

      - name: Call deployment webhook
        if: ${{ env.DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl --fail-with-body --request POST "$DEPLOY_WEBHOOK_URL" \
            --header "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"repository":"${{ github.repository }}","ref":"${{ github.ref }}","sha":"${{ github.sha }}","run_id":"${{ github.run_id }}"}'
